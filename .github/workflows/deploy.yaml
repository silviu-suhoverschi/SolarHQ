name: Deploy

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: amd64
            build_from: ghcr.io/hassio-addons/base-python:3.11
            platform: linux/amd64
          - arch: aarch64
            build_from: ghcr.io/hassio-addons/base-python/aarch64:3.11
            platform: linux/arm64
          - arch: armv7
            build_from: ghcr.io/hassio-addons/base-python/armv7:3.11
            platform: linux/arm/v7

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for cross-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.arch }}:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.arch }}:latest
          build-args: |
            BUILD_FROM=${{ matrix.build_from }}
            BUILD_VERSION=${{ steps.version.outputs.VERSION }}
            BUILD_ARCH=${{ matrix.arch }}
          platforms: ${{ matrix.platform }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-build-yaml:
    name: Update build.yaml image refs
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Update build.yaml with new image tags
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          sed -i "s|:latest|:${VERSION}|g" build.yaml
      - name: Commit updated build.yaml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add build.yaml
          git commit -m "chore: update build.yaml to v${GITHUB_REF#refs/tags/v}" || true
          git push origin HEAD:main || true
